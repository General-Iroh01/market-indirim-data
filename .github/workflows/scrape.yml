name: İndirim Tarama

on:
  schedule:
    - cron: '0 */6 * * *'   # her 6 saatte bir (UTC)
  workflow_dispatch: {}      # Actions sekmesinden elle de tetiklenebilir

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Bağımlılıkları kur
        # npm ci DEĞİL: package-lock.json elle (Node çalıştırılamayan bir
        # ortamda) güncellendiği için package.json ile birebir senkron değil,
        # npm ci bu durumda sert hata verir. npm install daha toleranslı.
        run: npm install

      - name: Tüm marketleri tara
        run: npm run scrape
        continue-on-error: true   # bir marka koparsa (site değişikliği vb.) diğerleri yine de yazılsın

      - name: Değişiklikleri commit'le ve gönder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/discounts.json
          git diff --staged --quiet || git commit -m "Otomatik tarama: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
